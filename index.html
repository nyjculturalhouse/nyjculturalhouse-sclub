<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>남양주시 문화의집 웹시스템</title>

    <link rel="stylesheet" href="css/style.css">
</head>

        <button class="btn primary" onclick="location.href='attendance.html'">

            외부활동 공유

        >
            📅 동아리 활동 일정 확인
        </button>

        <div
            onclick="location.href='admin.html'"
            style="text-align:center; color:#ccc; margin-top:40px; font-size:14px; cursor:pointer;"

<script src="js/api.js"></script>
